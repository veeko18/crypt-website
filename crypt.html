<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo-section">
          <img src="img/logo2.png" alt="Logo" width="200" height="200" />
        </div>
        <div class="menu">
          <a href="#">Home</a>
          <a href="#">Games</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </div>
        <div class="button-section">
          <button id="button" type="button">Get Started</button>
        </div>
      </div>
    </nav>

    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>WELCOME TO CRYPT</h1>
          <p class="hero-kicker">Games From the Crypt.</p>
          <p class="hero-text">
            Developing dark games that bring nightmares to life.
          </p>
          <p class="hero-text2">Join us in the shadows.</p>
        </div>
        <div class="hero-actions">
          <a href="#" class="hero-btn hero-btn-primary">Start Now</a>
          <a href="#" class="hero-btn hero-btn-secondary">Explore Games</a>
        </div>

        <div class="hero-image">
          <img src="img/background.png" alt="Crypto gaming visual" />
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
